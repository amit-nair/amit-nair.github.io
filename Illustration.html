<head>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        /* --- Original HTML/Body Logic --- */
        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: 'Jost', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            overflow-x: hidden;
            letter-spacing: 0.05em;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* --- Original Background Canvas Logic --- */
        #boidCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* --- Original Header Styles --- */
        header {
            position: fixed;
            top: 40px;
            left: 5%;
            right: 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-sizing: border-box;
            pointer-events: auto;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-left a {
            display: flex;
            align-items: center;
            transition: opacity 0.3s ease;
            text-decoration: none;
        }

        .header-left a:hover {
            opacity: 0.8;
        }

        .profile-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #ddd;
            cursor: pointer;
        }

        .name-container {
            display: flex;
            flex-direction: column;
        }

        .header-left h1 {
            margin: 0;
            font-size: 1.6em;
            letter-spacing: 0.15em;
            font-weight: 370;
            color: #000;
        }

        .header-left p {
            margin: 2px 0 0;
            font-size: 0.9em;
            opacity: 0.7;
            letter-spacing: 0.2em;
            font-weight: 430;
            color: #444;
        }

        .header-right a {
            color: #1a1a1a;
            margin-left: 25px;
            font-size: 1.3em;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .header-right a:hover {
            color: #888;
        }

        h2 {
            font-size: 2.8em;
            letter-spacing: 0.15em;
            font-weight: 400;
            margin-bottom: 20px;
            color: #000;
            text-align: center;
            margin-top: 0;
        }
        
        .collaborators {
            font-size: 0.9em;
            opacity: 0.7;
            margin-bottom: 30px;
            color: #444;
        }


        main {
            padding: 160px 5% 100px 5%;
            position: relative;
            z-index: 10;
        }

        .collage-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .collage-grid {
            column-count: 3;
            column-gap: 20px;
            width: 100%;
        }

        .art-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            break-inside: avoid;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .art-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .art-item img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.4); /* Transparent Base */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(20px); /* Frosted Glass Effect */
            -webkit-backdrop-filter: blur(20px);
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 0; /* No padding on overlay for tight look */
            box-sizing: border-box;
        }

        .tooltip-card {
            background: rgba(255, 255, 255, 0.1); /* Very transparent card panel */
            border-radius: 20px;
            max-width: 800px;
            width: 95%; /* Small margin on desktop */
            display: flex;
            flex-direction: column;
            max-height: 95vh; /* Almost full height */
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.2); /* Glass border */
        }

        .tooltip-img-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            /* YELLOW BASE REMOVED */
            overflow: hidden;
            min-height: 0; 
            padding: 0; /* Minimal padding around image */
        }

        .tooltip-img {
            max-width: 100%;
            max-height: 70vh; /* Allow image to be tall */
            object-fit: contain;
            display: block;
        }

        .tooltip-text {
            /* Text has a solid white base card and comfortable padding */
            padding: 25px 30px; 
            font-size: 1.05em;
            line-height: 1.5;
            color: #333;
            font-weight: 300;
            margin: 0;
            background: #ffffff; /* Solid White Base for Text */
            overflow-y: auto; 
            border-top: 1px solid rgba(0,0,0,0.05); /* Subtle separation */
        }

        .close-btn {
            position: fixed;
            top: 25px;
            right: 25px;
            font-size: 2.5em;
            cursor: pointer;
            z-index: 2100;
            color: #000;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }
        
        .close-btn:hover {
            opacity: 1;
        }

        /* --- Mobile Responsiveness Logic --- */
        @media (max-width: 900px) {
            .collage-grid { column-count: 2; }
        }

        @media (max-width: 768px) {
            header { top: 20px; }
            .header-left h1 { font-size: 1.2em; }
            .header-left p { font-size: 0.7em; }
            .profile-img { width: 50px; height: 50px; }
            h2 { font-size: 2.2em; }
        }

        @media (max-width: 600px) {
            .collage-grid { column-count: 1; }
            main { padding-top: 130px; }
            
            .overlay { align-items: center; } /* Keep centered */
            
            .tooltip-card {
                border-radius: 12px; /* Small radius on mobile */
                height: auto;
                max-height: 90vh;
                width: 90%; /* Tight but not edge-to-edge */
                transform: translateY(0);
            }

            .tooltip-img {
                max-height: 60vh; /* Leave room for text */
            }

            .tooltip-text {
                padding: 20px;
                font-size: 1em;
            }

            .close-btn {
                top: 15px;
                right: 20px;
                font-size: 2.2em;
                background: rgba(255,255,255,0.7); /* Blend with glass */
                width: 40px;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                backdrop-filter: blur(5px);
            }
        }
    </style>
</head>

<body>

    <div id="overlay" class="overlay" onclick="closeTooltip()">
        <!--span class="close-btn" onclick="closeTooltip()">&times;</span-->
        <div class="tooltip-card" onclick="event.stopPropagation()">
            <div class="tooltip-img-container">
                <img id="modalImg" class="tooltip-img" src="" alt="Full View Artwork">

    <script>
        /* --- Tooltip Functionality --- */
        function openTooltip(imgSrc, description) {
            document.getElementById('modalImg').src = imgSrc;
            document.getElementById('tip-desc').innerText = description;
            const overlay = document.getElementById('overlay');
            overlay.style.display = 'flex';
            setTimeout(() => { 
                overlay.style.opacity = '1'; 
                document.querySelector('.tooltip-card').style.transform = 'translateY(0)';
            }, 10);
            document.body.style.overflow = 'hidden'; 
        }

        function closeTooltip() {
            const overlay = document.getElementById('overlay');
            const card = document.querySelector('.tooltip-card');
            overlay.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
            document.body.style.overflow = 'auto'; 
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeTooltip();
        });

        /* --- Original Boid Logic (Exact) --- */
        const canvas = document.getElementById('boidCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        const fishImg = new Image(); fishImg.src = 'fish.png';
        const anglerImg = new Image(); anglerImg.src = 'angler.png';
        const placeholderJelly = new Image(); placeholderJelly.src = 'jelly.png';

        const animalPool = [
            { name: "Jellyfish", weight: 50, img: placeholderJelly },
            { name: "Octopus", weight: 5, img: placeholderJelly },
            { name: "Shark", weight: 5, img: placeholderJelly },
            { name: "Isopod", weight: 5, img: placeholderJelly },
            { name: "Squid", weight: 5, img: placeholderJelly },
            { name: "Nautilus", weight: 5, img: placeholderJelly },
            { name: "Sea Lilly", weight: 5, img: placeholderJelly },
            { name: "Crab", weight: 5, img: placeholderJelly },
            { name: "Submarine", weight: 5, img: placeholderJelly },
            { name: "Gulper Eel", weight: 5, img: placeholderJelly },
            { name: "Seadragon", weight: 5, img: placeholderJelly }
        ];

        function getRandomAnimal() {
            let totalWeight = animalPool.reduce((sum, animal) => sum + animal.weight, 0);
            let random = Math.random() * totalWeight;
            for (let animal of animalPool) {
                if (random < animal.weight) return animal;
                random -= animal.weight;
            }
            return animalPool[0];
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let angler = { x: -200, y: -200, targetX: -200, targetY: -200, flipped: false, angle: 0 };
        window.addEventListener('click', (e) => {
            if (!document.getElementById('overlay').style.display || document.getElementById('overlay').style.display === 'none') {
                if (!e.target.closest('header')) {
                    angler.targetX = e.clientX;
                    angler.targetY = e.clientY;
                }
            }
        });

        class Boid {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.accX = 0;
                this.accY = 0;
                this.baseMaxSpeed = 1 + Math.random() * 0.4;
                this.burstMaxSpeed = 2.5 + Math.random() * 1;
                this.maxSpeed = this.baseMaxSpeed;
                this.maxForce = 0.05;
                this.isBursting = false;
                this.burstTimer = 0;
                this.width = 30;
            }

            applyBehaviors(boids) {
                if (!this.isBursting && Math.random() < 0.003) {
                    this.isBursting = true;
                    this.burstTimer = 30 + Math.random() * 40;
                }
                if (this.isBursting) {
                    this.maxSpeed = this.burstMaxSpeed;
                    this.maxForce = 0.2;
                    this.burstTimer--;
                    if (this.burstTimer <= 0) this.isBursting = false;
                } else {
                    this.maxSpeed += (this.baseMaxSpeed - this.maxSpeed) * 0.1;
                    this.maxForce = 0.05;
                }
                let sep = this.separate(boids);
                let ali = this.align(boids);
                let coh = this.cohesion(boids);
                let avoid = this.avoidAngler();
                this.accX += sep.x * 1.5 + ali.x * 1.0 + coh.x * 1.0 + avoid.x * 4.0;
                this.accY += sep.y * 1.5 + ali.y * 1.0 + coh.y * 1.0 + avoid.y * 4.0;
                this.accX += Math.cos(Date.now() * 0.001 + this.x) * 0.02;
                this.accY += Math.sin(Date.now() * 0.001 + this.y) * 0.02;
            }

            avoidAngler() {
                let d = Math.hypot(this.x - angler.x, this.y - angler.y);
                if (d < 180) {
                    this.isBursting = true;
                    this.burstTimer = 20;
                    return { x: (this.x - angler.x) / d, y: (this.y - angler.y) / d };
                }
                return { x: 0, y: 0 };
            }

            separate(boids) {
                let steerX = 0, steerY = 0, count = 0;
                for (let other of boids) {
                    let d = Math.hypot(this.x - other.x, this.y - other.y);
                    if (d > 0 && d < 30) {
                        steerX += (this.x - other.x) / d;
                        steerY += (this.y - other.y) / d;
                        count++;
                    }
                }
                return count > 0 ? { x: steerX / count, y: steerY / count } : { x: 0, y: 0 };
            }

            align(boids) {
                let avgX = 0, avgY = 0, count = 0;
                for (let other of boids) {
                    let d = Math.hypot(this.x - other.x, this.y - other.y);
                    if (d > 0 && d < 60) {
                        avgX += other.vx; avgY += other.vy;
                        count++;
                    }
                }
                return count > 0 ? { x: avgX / count, y: avgY / count } : { x: 0, y: 0 };
            }

            cohesion(boids) {
                let avgX = 0, avgY = 0, count = 0;
                for (let other of boids) {
                    let d = Math.hypot(this.x - other.x, this.y - other.y);
                    if (d > 0 && d < 60) {
                        avgX += other.x; avgY += other.y;
                        count++;
                    }
                }
                return count > 0 ? { x: (avgX / count - this.x) * 0.01, y: (avgY / count - this.y) * 0.01 } : { x: 0, y: 0 };
            }

            update() {
                this.vx += this.accX; this.vy += this.accY;
                let mag = Math.hypot(this.vx, this.vy);
                if (mag > this.maxSpeed) {
                    this.vx = (this.vx / mag) * this.maxSpeed;
                    this.vy = (this.vy / mag) * this.maxSpeed;
                }
                this.x += this.vx; this.y += this.vy;
                this.accX = 0; this.accY = 0;
                const margin = 100;
                if (this.x < -margin) this.x = width + margin;
                if (this.x > width + margin) this.x = -margin;
                if (this.y < -margin) this.y = height + margin;
                if (this.y > height + margin) this.y = -margin;
            }

            draw() {
                if (!fishImg.complete) return;
                const aspectRatio = fishImg.naturalHeight / fishImg.naturalWidth;
                const h = this.width * aspectRatio;
                ctx.save();
                ctx.translate(this.x, this.y);
                let angle = Math.atan2(this.vy, this.vx);
                ctx.rotate(angle);
                if (this.vx < 0) ctx.scale(1, -1);
                ctx.drawImage(fishImg, -this.width / 2, -h / 2, this.width, h);
                ctx.restore();
            }
        }

        class AmbientAnimal {
            constructor() {
                this.reset();
                this.y = Math.random() * height;
            }
            reset() {
                const species = getRandomAnimal();
                this.img = species.img;
                this.x = Math.random() * width;
                this.y = height + 100;
                this.speed = 0.2 + Math.random() * 0.5;
                this.offset = Math.random() * 100;
                this.baseSize = 40 + Math.random() * 20;
            }
            update() {
                this.y -= this.speed;
                this.x += Math.sin(this.y * 0.01 + this.offset) * 0.5;
                if (this.y < -200) this.reset();
            }
            draw() {
                if (!this.img.complete) return;
                const aspectRatio = this.img.naturalHeight / this.img.naturalWidth;
                const drawWidth = this.baseSize;
                const drawHeight = drawWidth * aspectRatio;
                ctx.save();
                ctx.globalAlpha = 0.4;
                ctx.drawImage(this.img, this.x - drawWidth / 2, this.y - drawHeight / 2, drawWidth, drawHeight);
                ctx.restore();
            }
        }

        const boids = Array.from({ length: 50 }, () => new Boid());
        const ambientAnimals = Array.from({ length: 3 }, () => new AmbientAnimal());

        function loop() {
            ctx.clearRect(0, 0, width, height);
            let dx = angler.targetX - angler.x;
            let dy = angler.targetY - angler.y;
            angler.x += dx * 0.02;
            angler.y += dy * 0.02;
            angler.flipped = dx < 0;
            angler.angle = Math.atan2(dy, dx);

            ambientAnimals.forEach(a => { a.update(); a.draw(); });
            boids.forEach(b => { b.applyBehaviors(boids); b.update(); b.draw(); });

            if (anglerImg.complete) {
                const anglerAspect = anglerImg.naturalHeight / anglerImg.naturalWidth;
                const anglerW = 80;
                const anglerH = anglerW * anglerAspect;
                ctx.save();
                ctx.translate(angler.x, angler.y);
                if (angler.flipped) {
                    ctx.scale(-1, 1);
                    ctx.rotate(-angler.angle + Math.PI);
                } else {
                    ctx.rotate(angler.angle);
                }
                ctx.drawImage(anglerImg, -anglerW / 2, -anglerH / 2, anglerW, anglerH);
                ctx.restore();
            }
            ctx.globalAlpha = 0.6; 
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
